<!-- Superseded three-node architecture retained for project history. -->
<svg width="1280" height="900" viewBox="0 0 1280 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f5fbf"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f7a3a"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #111; }
      .subtitle { font-family: Arial, sans-serif; font-size: 17px; fill: #444; }
      .section { font-family: Arial, sans-serif; font-size: 21px; font-weight: 700; fill: #111; }
      .boxTitle { font-family: Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #111; }
      .text { font-family: Arial, sans-serif; font-size: 15px; fill: #222; }
      .small { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
      .tiny { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }

      .node { fill: #fff4e5; stroke: #c47a00; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .master { fill: #e9f8ef; stroke: #1f7a3a; stroke-width: 2.2; rx: 16; filter: url(#shadow); }
      .process { fill: #ffffff; stroke: #a0a0a0; stroke-width: 1.5; rx: 16; filter: url(#shadow); }
      .screen { fill: #edf3ff; stroke: #1f5fbf; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .warn { fill: #fff2f2; stroke: #cc3a3a; stroke-width: 2; rx: 16; }

      .uwb { stroke: #1f5fbf; stroke-width: 3; stroke-dasharray: 9 7; fill: none; }
      .broadcast { stroke: #1f7a3a; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .flow { stroke: #444; stroke-width: 2.2; fill: none; marker-end: url(#arrowBlue); }
    </style>
  </defs>

  <rect width="1280" height="900" fill="#fafafa"/>

  <text x="55" y="55" class="title">Relative 2D Map Architecture (No GPS, No Fixed Anchor)</text>
  <text x="55" y="84" class="subtitle">ทุก node เคลื่อนที่ได้ | ใช้ UWB วัดระยะกันครบ 3 คู่ | Master สร้างแผนที่ 2D แบบสัมพันธ์กัน แล้วส่งกลับไปทุกจอ</text>

  <rect x="40" y="115" width="1200" height="610" fill="#ffffff" stroke="#dddddd" stroke-width="2" rx="22"/>
  <text x="65" y="150" class="section">1) Hardware Layout</text>

  <!-- Slave 1 -->
  <rect x="80" y="210" width="255" height="195" class="node"/>
  <text x="108" y="245" class="boxTitle">Slave 1</text>
  <text x="108" y="278" class="text">ESP32 + BU01 UWB</text>
  <text x="108" y="303" class="text">BPM Sensor</text>
  <text x="108" y="328" class="text">Screen</text>
  <text x="108" y="353" class="text">Battery</text>
  <text x="108" y="382" class="small">ส่ง: BPM, battery, ID</text>

  <!-- Master -->
  <rect x="510" y="180" width="260" height="255" class="master"/>
  <text x="540" y="215" class="boxTitle">Master</text>
  <text x="540" y="248" class="text">ESP32 + BU01 UWB</text>
  <text x="540" y="280" class="text">เก็บข้อมูลจากทุก node</text>
  <text x="540" y="305" class="text">คำนวณแผนที่ 2D</text>
  <text x="540" y="330" class="text">รวม BPM ของทุกคน</text>
  <text x="540" y="355" class="text">ส่งผลกลับไปทุกจอ</text>
  <text x="540" y="390" class="small">จุดอ้างอิงกลางของทีม</text>

  <!-- Slave 2 -->
  <rect x="945" y="210" width="255" height="195" class="node"/>
  <text x="973" y="245" class="boxTitle">Slave 2</text>
  <text x="973" y="278" class="text">ESP32 + BU01 UWB</text>
  <text x="973" y="303" class="text">BPM Sensor</text>
  <text x="973" y="328" class="text">Screen</text>
  <text x="973" y="353" class="text">Battery</text>
  <text x="973" y="382" class="small">ส่ง: BPM, battery, ID</text>

  <!-- UWB triangle -->
  <path d="M335 290 C410 250 450 235 510 255" class="uwb"/>
  <text x="365" y="235" class="small">UWB distance: Master ↔ Slave 1</text>

  <path d="M770 255 C830 235 870 250 945 290" class="uwb"/>
  <text x="815" y="235" class="small">UWB distance: Master ↔ Slave 2</text>

  <path d="M335 318 C515 430 770 430 945 318" class="uwb"/>
  <text x="515" y="455" class="small">UWB distance: Slave 1 ↔ Slave 2</text>

  <!-- Packet flow -->
  <path d="M335 360 C420 380 460 380 510 355" class="flow"/>
  <path d="M945 360 C860 380 820 380 770 355" class="flow"/>
  <text x="420" y="405" class="small">BPM / battery / ID</text>
  <text x="785" y="405" class="small">BPM / battery / ID</text>

  <!-- Process -->
  <text x="65" y="500" class="section">2) Master Logic</text>
  <rect x="80" y="530" width="1120" height="150" class="process"/>

  <rect x="105" y="558" width="200" height="95" class="process"/>
  <text x="125" y="590" class="boxTitle">Step 1</text>
  <text x="125" y="618" class="text">วัดระยะครบ 3 คู่</text>
  <text x="125" y="640" class="small">M↔S1, M↔S2, S1↔S2</text>

  <path d="M305 605 L365 605" class="flow"/>

  <rect x="365" y="558" width="200" height="95" class="process"/>
  <text x="385" y="590" class="boxTitle">Step 2</text>
  <text x="385" y="618" class="text">สร้างรูปสามเหลี่ยม</text>
  <text x="385" y="640" class="small">เป็นแผนที่ 2D ของทีม</text>

  <path d="M565 605 L625 605" class="flow"/>

  <rect x="625" y="558" width="200" height="95" class="process"/>
  <text x="645" y="590" class="boxTitle">Step 3</text>
  <text x="645" y="618" class="text">รวม BPM ทุกคน</text>
  <text x="645" y="640" class="small">พร้อมสถานะแบตเตอรี่</text>

  <path d="M825 605 L885 605" class="flow"/>

  <rect x="885" y="558" width="290" height="95" class="process"/>
  <text x="905" y="590" class="boxTitle">Step 4</text>
  <text x="905" y="618" class="text">ส่งแผนที่ + BPM กลับไปทุกจอ</text>
  <text x="905" y="640" class="small">ทุกคนเห็นภาพรวมของทีมเหมือนกัน</text>

  <!-- Screen output -->
  <rect x="360" y="740" width="560" height="115" class="screen"/>
  <text x="385" y="775" class="boxTitle">Example Screen on Each Slave</text>
  <text x="385" y="806" class="text">Relative 2D Map: Master ตรงกลาง, Slave 1 และ Slave 2 อยู่ตามระยะจริงของทีม</text>
  <text x="385" y="832" class="text">Status: S1 = 82 BPM | S2 = 91 BPM | Master = OK</text>

  <!-- Broadcast -->
  <path d="M640 435 C640 485 640 510 640 530" class="broadcast"/>
  <text x="655" y="493" class="small">Master computes and broadcasts result</text>

  <!-- Warning -->
  <rect x="950" y="742" width="250" height="110" class="warn"/>
  <text x="970" y="774" class="boxTitle">Important Note</text>
  <text x="970" y="803" class="small">นี่คือแผนที่ 2D</text>
  <text x="970" y="823" class="small">แบบสัมพันธ์กันภายในทีม</text>
  <text x="970" y="843" class="small">ไม่ใช่พิกัดโลกจริง</text>
</svg>
