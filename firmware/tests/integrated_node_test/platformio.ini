[platformio]
default_envs = node_a_anchor

[common]
integrated_lib_deps =
  sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library
  adafruit/Adafruit GFX Library
  adafruit/Adafruit ST7735 and ST7789 Library

[env:embedded]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_extra_dirs =
  ../../../lib
build_flags =
  -DUWB_ANTENNA_DELAY=16555
  -DUWB_DISCOVERY_RECOVERY_TIMEOUT_MS=5000
  -DUWB_CONNECTED_RECOVERY_TIMEOUT_MS=15000
  -DUWB_DEVICE_INACTIVITY_TIMEOUT_MS=8000
  -DUWB_DEVICE_INACTIVITY_GRACE_PERIOD_MS=20000

[env:node_a_anchor]
extends = env:embedded
lib_deps =
  ${common.integrated_lib_deps}
build_flags =
  ${env:embedded.build_flags}
  -D BPMWATCH_NODE_ID=0

[env:node_a_anchor_trace]
extends = env:node_a_anchor
build_flags =
  ${env:node_a_anchor.build_flags}
  -D UWB_TRACE_FRAMES=true

[env:node_a_anchor_espnow_range]
extends = env:node_a_anchor
build_flags =
  ${env:node_a_anchor.build_flags}
  -D BPMWATCH_ESPNOW_RANGE_LINK=true
  -D BPMWATCH_UWB_TASK=true
  -D BPMWATCH_UWB_TASK_PRIORITY=4
  -D BPMWATCH_UWB_TASK_CORE=1
  -D BPMWATCH_UWB_TASK_STACK=8192
  -D BPMWATCH_UWB_POLLS_PER_TICK=4
  -D BPMWATCH_UWB_IDLE_POLLS=1
  -D BPMWATCH_UWB_IRQ_BURST_POLLS=2
  -D BPMWATCH_MAX_TASK=true
  -D BPMWATCH_MAX_TASK_PRIORITY=3
  -D BPMWATCH_MAX_TASK_CORE=0
  -D BPMWATCH_MAX_TASK_STACK=6144
  -D BPMWATCH_MAX_SAMPLE_INTERVAL_MS=10
  -D UWB_LIBRARY_LOGS=false

[env:node_a_anchor_espnow_range_trace]
extends = env:node_a_anchor_espnow_range
build_flags =
  ${env:node_a_anchor_espnow_range.build_flags}
  -D UWB_TRACE_FRAMES=true

[env:node_a_uwb_only]
extends = env:embedded
build_src_filter =
  +<*>
  -<DiagnosticsDisplay.cpp>
  -<EspNowRangeLink.cpp>
  -<Gy511Sensor.cpp>
  -<Max30102Sensor.cpp>
lib_ignore =
  SparkFun MAX3010x Pulse and Proximity Sensor Library
  Adafruit GFX Library
  Adafruit ST7735 and ST7789 Library
  WiFi
  Wire
build_flags =
  ${env:embedded.build_flags}
  -D BPMWATCH_NODE_ID=0
  -D BPMWATCH_UWB_TASK=true
  -D BPMWATCH_UWB_TASK_PRIORITY=5
  -D BPMWATCH_UWB_TASK_CORE=1
  -D BPMWATCH_UWB_TASK_STACK=8192
  -D BPMWATCH_UWB_POLLS_PER_TICK=256
  -D BPMWATCH_UWB_IDLE_POLLS=1
  -D BPMWATCH_UWB_IRQ_BURST_POLLS=32
  -D BPMWATCH_ENABLE_DISPLAY=false
  -D BPMWATCH_ENABLE_GY511=false
  -D BPMWATCH_ENABLE_MAX30102=false
  -D BPMWATCH_ENABLE_I2C_SCAN=false
  -D BPMWATCH_ESPNOW_RANGE_LINK=false
  -D UWB_LIBRARY_LOGS=false

[env:node_a_uwb_only_trace]
extends = env:node_a_uwb_only
build_flags =
  ${env:node_a_uwb_only.build_flags}
  -D UWB_TRACE_FRAMES=true

[env:node_a_uwb_loop_only]
extends = env:node_a_uwb_only
build_flags =
  ${env:embedded.build_flags}
  -D BPMWATCH_NODE_ID=0
  -D BPMWATCH_UWB_TASK=false
  -D BPMWATCH_ENABLE_DISPLAY=false
  -D BPMWATCH_ENABLE_GY511=false
  -D BPMWATCH_ENABLE_MAX30102=false
  -D BPMWATCH_ENABLE_I2C_SCAN=false
  -D BPMWATCH_ESPNOW_RANGE_LINK=false
  -D UWB_LIBRARY_LOGS=false

[env:node_b_tag]
extends = env:embedded
lib_deps =
  ${common.integrated_lib_deps}
build_flags =
  ${env:embedded.build_flags}
  -D BPMWATCH_NODE_ID=1

[env:node_b_tag_trace]
extends = env:node_b_tag
build_flags =
  ${env:node_b_tag.build_flags}
  -D UWB_TRACE_FRAMES=true

[env:node_b_tag_espnow_display]
extends = env:node_b_tag
build_flags =
  ${env:node_b_tag.build_flags}
  -D BPMWATCH_ESPNOW_RANGE_LINK=true
  -D BPMWATCH_UWB_TASK=true
  -D BPMWATCH_UWB_TASK_PRIORITY=4
  -D BPMWATCH_UWB_TASK_CORE=1
  -D BPMWATCH_UWB_TASK_STACK=8192
  -D BPMWATCH_UWB_POLLS_PER_TICK=4
  -D BPMWATCH_UWB_IDLE_POLLS=1
  -D BPMWATCH_UWB_IRQ_BURST_POLLS=2
  -D BPMWATCH_MAX_TASK=true
  -D BPMWATCH_MAX_TASK_PRIORITY=3
  -D BPMWATCH_MAX_TASK_CORE=0
  -D BPMWATCH_MAX_TASK_STACK=6144
  -D BPMWATCH_MAX_SAMPLE_INTERVAL_MS=10
  -D UWB_LIBRARY_LOGS=false

[env:node_b_tag_espnow_display_trace]
extends = env:node_b_tag_espnow_display
