[platformio]
default_envs = master

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_extra_dirs =
  ../../../lib

[env:master]
build_flags =
  -DUWB_IS_MASTER=1
  -DDEBUG=true
  -DUWB_TRACE_FRAMES=0
  -DUWB_ANTENNA_DELAY=16555
  -DUWB_DISCOVERY_RECOVERY_TIMEOUT_MS=5000
  -DUWB_CONNECTED_RECOVERY_TIMEOUT_MS=15000

[env:tag]
build_flags =
  -DUWB_IS_MASTER=0
  -DDEBUG=true
  -DUWB_TRACE_FRAMES=0
  -DUWB_ANTENNA_DELAY=16555
  -DUWB_DISCOVERY_RECOVERY_TIMEOUT_MS=5000
  -DUWB_CONNECTED_RECOVERY_TIMEOUT_MS=15000
